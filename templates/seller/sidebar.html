<aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-100 border-r transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
    <div class="p-6">
        <h1 class="text-xl font-bold tracking-tight text-gray-800">Gallery Admin</h1>
        <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Premium Curator</p>
    </div>

    <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
        <a href="{% url 'seller_dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all {% if request.resolver_match.url_name == 'seller_dashboard' %}bg-white shadow-sm text-black font-bold{% else %}text-gray-600 hover:bg-gray-200{% endif %}">
            <i class="fa-solid fa-house mr-3 w-5 text-center"></i> Dashboard
        </a>
        <a href="{% url 'inventory_page' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-xl transition-all">
            <i class="fa-solid fa-box mr-3 w-5 text-center"></i> Inventory
        </a>
        <a href="{% url 'order_page' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-xl transition-all">
            <i class="fa-solid fa-cart-shopping mr-3 w-5 text-center"></i> Orders
        </a>
        <a href="{% url 'analytics_page' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-xl transition-all">
            <i class="fa-solid fa-chart-line mr-3 w-5 text-center"></i> Analytics
        </a>

        <div class="pt-8 pb-2 px-4 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Account</div>

        <a href="{% url 'view_profile' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-xl transition-all">
            <i class="fa-solid fa-user-gear mr-3 w-5 text-center"></i> Profile
        </a>
    </nav>

    <div class="p-4 border-t border-gray-200 bg-gray-100">
        <a href="{% url 'add_product' %}" class="flex items-center justify-center w-full bg-zinc-900 text-white py-3 rounded-xl text-sm font-bold hover:bg-zinc-800 transition shadow-lg shadow-zinc-200">
            <i class="fa-solid fa-plus mr-2"></i> Add Product
        </a>
        <div class="pt-4 flex flex-col space-y-1">
            <a href="#" class="text-xs font-semibold text-gray-500 hover:text-black px-4"><i class="fa-solid fa-circle-question mr-2"></i> Help Center</a>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="text-xs font-bold text-red-500 hover:bg-red-50 w-full text-left px-4 py-2 rounded-lg transition">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
                </button>
            </form>
        </div>
    </div>
</aside>
