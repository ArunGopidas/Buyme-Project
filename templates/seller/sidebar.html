<aside class="fixed top-0 left-0 z-40 w-64 h-full transition-transform -translate-x-full lg:translate-x-0 bg-slate-900 border-r border-slate-800 flex flex-col" aria-label="Sidebar">

    <div class="px-6 py-8 flex items-center space-x-3">
        <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
        </div>
        <span class="text-xl font-bold tracking-tight text-white">BuyME</span>
    </div>

    <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
        <div class="mb-4">
            <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Main Menu</p>

            <a href="{% url 'seller_dashboard' %}"
               class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-all duration-200 group
               {% if request.resolver_match.url_name == 'seller_dashboard' %} bg-blue-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-slate-200 {% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Dashboard
            </a>

            <a href="{% url 'inventory_page' %}"
               class="flex items-center px-3 py-2.5 mt-1 text-sm font-medium rounded-lg transition-all duration-200 group
               {% if request.resolver_match.url_name == 'inventory_page' %} bg-blue-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-slate-200 {% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                Inventory
            </a>

            <a href="{% url 'order_page' %}"
               class="flex items-center px-3 py-2.5 mt-1 text-sm font-medium rounded-lg transition-all duration-200 group
               {% if request.resolver_match.url_name == 'order_page' %} bg-blue-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-slate-200 {% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                Orders
            </a>

            <a href="{% url 'analytics_page' %}"
               class="flex items-center px-3 py-2.5 mt-1 text-sm font-medium rounded-lg transition-all duration-200 group
               {% if request.resolver_match.url_name == 'analytics_page' %} bg-blue-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-slate-200 {% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                Analytics
            </a>
        </div>

        <div class="pt-4 border-t border-slate-800">
            <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">System</p>
            <a href="{% url 'edit_profile' %}"
               class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-all duration-200 group
               {% if request.resolver_match.url_name == 'edit_profile' %} bg-blue-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-slate-200 {% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Settings
            </a>
        </div>
    </nav>

    <div class="p-4 border-t border-slate-800 bg-slate-900/50">
        <div class="relative">
            {% if user.profile_image %}
                <img class="w-10 h-10 rounded-lg object-cover border border-slate-700"
                     src="{{ user.profile_image.url }}"
                     alt="Profile">
            {% else %}
                <div class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center border border-indigo-400 shadow-lg shadow-indigo-500/20">
                    <span class="text-white font-bold text-sm uppercase">
                        {{ user.first_name|slice:":1" }}{{ user.last_name|slice:":1" }}
                    </span>
                </div>
            {% endif %}
        </div>

        <form action="{% url 'logout' %}" method="POST w-full">
            {% csrf_token %}
            <button type="submit" class="flex items-center justify-center w-full px-4 py-2 text-sm font-medium text-white bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white rounded-lg transition-all duration-200 group">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </button>
        </form>
    </div>
</aside>
