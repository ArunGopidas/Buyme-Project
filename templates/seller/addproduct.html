<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product | BuyMe</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Work Sans',sans-serif;
}
</style>

</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->

<header class="bg-black text-white px-8 py-4 flex justify-between items-center">

<h1 class="text-xl font-bold">BuyMe Seller</h1>

<a href="{% url 'inventorypage' %}" class="bg-white text-black px-4 py-2 rounded">
Inventory
</a>

</header>


<!-- MAIN -->

<div class="max-w-5xl mx-auto py-10 px-6">

<h2 class="text-3xl font-bold mb-8">Add New Product</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">


<!-- LEFT SECTION -->

<div class="lg:col-span-2 space-y-6">

<div class="bg-white p-6 rounded-lg shadow">

<h3 class="text-lg font-bold mb-6">Product Information</h3>

<div class="space-y-4">

<div>
<label class="block font-semibold mb-1">Product Name</label>
<input type="text" name="name" class="w-full border rounded p-3" required>
</div>


<div>
<label class="block font-semibold mb-1">Description</label>
<textarea name="description" rows="4" class="w-full border rounded p-3" required></textarea>
</div>


<div class="grid grid-cols-2 gap-4">

<div>
<label class="block font-semibold mb-1">Brand</label>
<input type="text" name="brand" class="w-full border rounded p-3" required>
</div>

<div>
<label class="block font-semibold mb-1">Model Number</label>
<input type="text" name="model_number" class="w-full border rounded p-3" required>
</div>

</div>


<div>
<label class="block font-semibold mb-1">Subcategory</label>

<select name="subcategory" class="w-full border rounded p-3" required>

<option value="">Select Subcategory</option>

{% for sub in subcategories %}

<option value="{{sub.id}}">
{{sub.name}}
</option>

{% endfor %}

</select>

</div>

</div>

</div>


<!-- PRICING -->

<div class="bg-white p-6 rounded-lg shadow">

<h3 class="text-lg font-bold mb-6">Pricing & Stock</h3>

<div class="grid grid-cols-2 gap-4">

<div>
<label class="block font-semibold mb-1">SKU</label>
<input type="text" name="sku" class="w-full border rounded p-3" required>
</div>

<div>
<label class="block font-semibold mb-1">Price</label>
<input type="number" name="price" class="w-full border rounded p-3" required>
</div>

<div>
<label class="block font-semibold mb-1">Stock</label>
<input type="number" name="stock" class="w-full border rounded p-3" required>
</div>

</div>

</div>

</div>



<!-- RIGHT SECTION -->

<div class="space-y-6">

<div class="bg-white p-6 rounded-lg shadow">

<h3 class="text-lg font-bold mb-4">Product Image</h3>

<input type="file" name="image" class="w-full">

</div>


<div class="bg-white p-6 rounded-lg shadow">

<button type="submit"
class="w-full bg-black text-white py-3 rounded font-bold hover:bg-gray-800">

Publish Product

</button>

</div>

</div>

</div>

</form>

</div>

</body>
</html>
