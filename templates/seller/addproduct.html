<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | GlobalStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:block">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-green-600">GlobalStore</h1>
            </div>
            <nav class="mt-4 px-4 space-y-1">
                <a href="{% url 'seller_dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-green-600 rounded-lg transition">
                    <i class="fas fa-home mr-3"></i> Dashboard
                </a>
                <a href="{% url 'inventorypage' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-green-600 rounded-lg transition">
                    <i class="fas fa-boxes mr-3"></i> Inventory
                </a>
                <a href="{% url 'addproduct' %}" class="flex items-center px-4 py-3 text-sm font-medium text-green-700 bg-green-50 rounded-lg">
                    <i class="fas fa-plus-circle mr-3"></i> Add Product
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto">
                <div class="mb-8 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">Add New Product</h2>
                        <p class="text-sm text-gray-500">List a new item on the GlobalStore marketplace.</p>
                    </div>
                    <div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-xs font-semibold flex items-center border border-blue-100">
                        <i class="fas fa-info-circle mr-2"></i> All products require Admin Approval before going live.
                    </div>
                </div>

                <form method="POST" enctype="multipart/form-data" class="space-y-6">
                    {% csrf_token %}
                    <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Product Title</label>
                            <input type="text" name="name" placeholder="Enter product name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                            <select name="subcategory" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none">
                                {% for sub in subcategories %}
                                <option value="{{ sub.id }}">{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Brand Name</label>
                            <input type="text" name="brand" placeholder="Brand name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Selling Price (₹)</label>
                            <input type="number" name="price" placeholder="0.00" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Initial Stock</label>
                            <input type="number" name="stock" placeholder="Qty" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none" required>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Product Description</label>
                            <textarea name="description" rows="4" placeholder="Tell customers about your product..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">SKU Code</label>
                            <input type="text" name="sku" placeholder="Unique SKU" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Model Number</label>
                            <input type="text" name="model_number" placeholder="Optional" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Product Image</label>
                            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-green-400 transition cursor-pointer">
                                <div class="space-y-1 text-center">
                                    <i class="fas fa-cloud-upload-alt text-gray-400 fa-2x mb-2"></i>
                                    <div class="flex text-sm text-gray-600">
                                        <input name="image" type="file" class="w-full">
                                    </div>
                                    <p class="text-xs text-gray-500">PNG, JPG up to 10MB</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end pt-4">
                        <button type="submit" class="bg-green-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-lg flex items-center">
                            <i class="fas fa-paper-plane mr-2"></i> Submit for Approval
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
