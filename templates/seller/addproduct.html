<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product | GlobalStore Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body{font-family: 'Plus Jakarta Sans', sans-serif;}
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <nav class="bg-white border-b border-gray-100 px-8 py-5 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-5">
            <a href="javascript:history.back()" class="h-11 w-11 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-green-600 transition-all shadow-sm">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <h1 class="text-2xl font-black text-gray-800 italic uppercase tracking-tighter">Buy <span class="text-green-600">ME</span></h1>
        </div>
        <button type="submit" form="productForm" class="px-10 py-3 rounded-xl bg-green-600 text-sm font-black uppercase tracking-widest shadow-lg shadow-green-100 hover:bg-green-700 transition-all text-white">
            Deploy Listing
        </button>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-6">
        <form id="productForm" action="{% url 'add_product' %}" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            {% csrf_token %}

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm space-y-8">
                    <h3 class="text-sm font-black text-green-600 uppercase tracking-[0.25em]">01. Product Identity</h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Title*</label>
                            <input type="text" id="id_name" name="name" required placeholder="Enter product title..."
                                   onkeyup="document.getElementById('id_slug').value = this.value.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '')"
                                   class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none focus:ring-2 focus:ring-green-500/10 transition-all">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-purple-600 uppercase tracking-widest ml-1">URL Slug (Auto)</label>
                            <input type="text" id="id_slug" name="slug" required placeholder="auto-generated-url"
                                   class="w-full px-6 py-5 rounded-2xl bg-purple-50 text-purple-700 border-none text-base font-black outline-none lowercase italic tracking-tight">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Subcategory*</label>
                            <select name="subcategory" required class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none appearance-none cursor-pointer">
                                {% for sub in subcategories %}
                                    <option value="{{ sub.id }}">{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">SKU CODE*</label>
                            <input type="text" name="sku" required placeholder="GS-UNIQUE-ID" class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-black outline-none uppercase tracking-tighter">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Brand Name</label>
                            <input type="text" name="brand" placeholder="Brand Name" class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Model Number</label>
                            <input type="text" name="model_number" placeholder="Model Number" class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Description*</label>
                        <textarea name="description" rows="5" placeholder="Tell customers about the product..." class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-medium leading-relaxed outline-none"></textarea>
                    </div>
                </div>

                <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm space-y-8">
                    <h3 class="text-sm font-black text-blue-600 uppercase tracking-[0.25em]">02. Financial & Tax</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">MRP*</label>
                            <input type="number" step="0.01" name="price" required placeholder="0.00" class="w-full px-5 py-5 rounded-xl bg-gray-50 border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">Sale Price*</label>
                            <input type="number" step="0.01" name="selling_price" required placeholder="0.00" class="w-full px-5 py-5 rounded-xl bg-green-50 text-green-700 border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">Cost Price*</label>
                            <input type="number" step="0.01" name="cost_price" required placeholder="0.00" class="w-full px-5 py-5 rounded-xl bg-gray-50 border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">Tax (%)*</label>
                            <input type="number" step="0.1" name="tax_percentage" value="5" class="w-full px-5 py-5 rounded-xl bg-gray-50 border-none text-base font-black outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-5">
                    <h3 class="text-xs font-black text-orange-600 uppercase tracking-[0.2em]">03. Media</h3>
                    <div class="aspect-square w-full bg-gray-50 rounded-2xl border-2 border-dashed border-gray-100 flex flex-col items-center justify-center relative group hover:border-green-400 transition-all">
                        <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 group-hover:text-green-500 mb-3"></i>
                        <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Primary Image</p>
                        <input type="file" name="image" required class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-8">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">04. Stock Control</h3>
                    <div class="flex justify-between items-center border-b border-gray-50 pb-6">
                        <label class="text-sm font-black text-gray-400 uppercase italic">Stock Qty*</label>
                        <input type="number" name="stock" required min="0" value="0" class="bg-gray-50 rounded-xl px-5 py-3 text-right font-black text-2xl outline-none w-28 text-green-600">
                    </div>
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Returnable</span>
                            <input type="checkbox" name="is_returnable" checked class="w-6 h-6 accent-green-600 rounded">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Cancellable</span>
                            <input type="checkbox" name="is_cancellable" checked class="w-6 h-6 accent-green-600 rounded">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Return Days</span>
                            <input type="number" name="return_days" required min="0" value="7" class="bg-gray-50 rounded-lg px-4 py-2 text-sm font-black w-16 text-center">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-6">
                    <h3 class="text-xs font-black text-purple-600 uppercase tracking-[0.2em]">05. Shipping Details</h3>
                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Weight (kg)</p>
                            <input type="number" step="0.01" name="weight" placeholder="0.00" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Length (cm)</p>
                            <input type="number" name="length" placeholder="0" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Width (cm)</p>
                            <input type="number" name="width" placeholder="0" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Height (cm)</p>
                            <input type="number" name="height" placeholder="0" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </main>

</body>
</html>
