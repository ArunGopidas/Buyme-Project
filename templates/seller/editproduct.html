<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | GlobalStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:block">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-green-600">GlobalStore</h1>
            </div>
            <nav class="mt-4 px-4 space-y-1">
                <a href="{% url 'seller_dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-green-600 rounded-lg transition">
                    <i class="fas fa-home mr-3"></i> Dashboard
                </a>
                <a href="{% url 'inventory_page' %}" class="flex items-center px-4 py-3 text-sm font-medium text-green-700 bg-green-50 rounded-lg transition">
                    <i class="fas fa-boxes mr-3"></i> Inventory
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto">
                <div class="mb-6 flex items-center">
                    <a href="{% url 'inventory_page' %}" class="h-10 w-10 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-500 hover:text-green-600 mr-4">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h2 class="text-2xl font-bold text-gray-800">Edit: {{ product.name }}</h2>
                </div>

                <form method="POST" enctype="multipart/form-data" class="space-y-6">
                    {% csrf_token %}
                    <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Product Name</label>
                            <input type="text" name="name" value="{{ product.name }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                            <select name="subcategory" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                {% for sub in subcategories %}
                                <option value="{{ sub.id }}" {% if product.subcategory.id == sub.id %}selected{% endif %}>{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Price (₹)</label>
                            <input type="number" name="price" value="{{ variant.selling_price }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Current Stock</label>
                            <input type="number" name="stock" value="{{ variant.stock_quantity }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">New Image (Optional)</label>
                            <input type="file" name="image" class="w-full text-xs text-gray-400">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                            <textarea name="description" rows="5" class="w-full px-4 py-2 border border-gray-300 rounded-lg">{{ product.description }}</textarea>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4 pt-4">
                        <a href="{% url 'inventory_page' %}" class="px-8 py-3 rounded-xl font-bold text-gray-500 hover:text-gray-700">Cancel</a>
                        <button type="submit" class="bg-green-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-green-700 shadow-md">
                            Update Product
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
