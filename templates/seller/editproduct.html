<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Product | BuyMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:block">
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-2xl font-bold text-green-600">BuyMe</h1>
            </div>
            <nav class="mt-6 px-4 space-y-2">
                <a href="{% url 'seller_dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-xl transition-all">
                    <i class="fas fa-chart-pie mr-3"></i> Dashboard
                </a>
                <a href="{% url 'inventory_page' %}" class="flex items-center px-4 py-3 text-sm font-bold text-green-700 bg-green-50 rounded-xl">
                    <i class="fas fa-boxes mr-3"></i> My Inventory
                </a>
                <a href="{% url 'order_page' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-xl transition-all">
                    <i class="fas fa-shopping-cart mr-3"></i> Orders
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white border-b border-gray-200 px-8 py-5 flex justify-between items-center sticky top-0 z-10">
                <h2 class="text-2xl font-bold text-gray-800">Update Product</h2>
                <a href="{% url 'inventory_page' %}" class="text-sm font-bold text-gray-400 hover:text-gray-600">Cancel</a>
            </header>

            <div class="p-8 max-w-4xl mx-auto">
                <form method="POST" enctype="multipart/form-data" class="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm space-y-6">
                    {% csrf_token %}

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Product Name</label>
                        <input type="text" name="name" value="{{ product.name }}" required class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Brand Name</label>
                            <input type="text" name="brand" value="{{ product.brand|default:'' }}" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Subcategory</label>
                            <select name="subcategory" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                                {% for sub in subcategories %}
                                    <option value="{{ sub.id }}" {% if sub.id == product.subcategory.id %}selected{% endif %}>{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Price (₹)</label>
                            <input type="number" step="0.01" name="price" value="{{ variant.selling_price|floatformat:2 }}" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Stock Quantity</label>
                            <input type="number" name="stock" value="{{ variant.stock_quantity }}" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">SKU Code</label>
                            <input type="text" name="sku" value="{{ variant.sku_code|default:'' }}" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Model Number</label>
                            <input type="text" name="model_number" value="{{ product.model_number|default:'' }}" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Description</label>
                        <textarea name="description" rows="4" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">{{ product.description }}</textarea>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Product Image</label>
                        <div class="flex items-center gap-4 mt-2">
                            {% if product.image %}
                                <img src="{{ product.image.url }}" class="h-16 w-16 object-cover rounded-lg border">
                            {% endif %}
                            <input type="file" name="image" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                        </div>
                    </div>

                    <div class="pt-6 flex justify-end">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition-all">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
