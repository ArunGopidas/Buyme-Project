<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Console | {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">

    {% include 'seller/sidebar.html' %}

    <div class="lg:ml-64 min-h-screen flex flex-col">
        <header class="lg:hidden bg-slate-900 text-white p-4 flex justify-between items-center">
            <span class="font-bold">SellerPro</span>
            <button class="p-2 bg-slate-800 rounded-md">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </header>

        <main class="flex-grow p-4 md:p-8">
            {% block content %}
            {% endblock %}
        </main>

        <footer class="p-8 text-center text-slate-400 text-xs">
            &copy; 2026 SellerPro Global. Professional Grade E-commerce.
        </footer>
    </div>

</body>
</html>
