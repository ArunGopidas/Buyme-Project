<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#141414",
                        "accent-cream": "#F9F7F2",
                        "background-light": "#f7f7f7",
                        "background-dark": "#191919",
                        "border-muted": "#E5E5E5",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <title>BUYME | Seller Registration</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-sans text-primary">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        
        <header class="flex items-center justify-between border-b border-primary/10 bg-white/80 backdrop-blur-md px-8 lg:px-20 py-4 sticky top-0 z-50">
            <div class="flex items-center gap-3 text-primary">
                <div class="size-6 text-primary">
                    <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
                    </svg>
                </div>
                <h2 class="font-display text-xl font-bold tracking-widest uppercase">BUYME</h2>
            </div>
            <div class="flex items-center gap-8">
                <a href="{% url 'login' %}" class="px-6 py-2 border border-primary text-xs uppercase tracking-widest font-bold hover:bg-primary hover:text-white transition-all">
                    Sign In
                </a>
            </div>
        </header>

        <main class="flex flex-1 flex-col lg:flex-row min-h-[calc(100vh-73px)]">
            <div class="hidden lg:block lg:w-5/12 relative overflow-hidden bg-primary">
                <div class="absolute inset-0 opacity-80 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&q=80')"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-primary/90 via-primary/20 to-transparent"></div>
                <div class="absolute bottom-20 left-12 right-12 text-white">
                    <span class="text-xs uppercase tracking-[0.3em] font-medium mb-4 block">Merchant Alliance</span>
                    <h3 class="font-display text-3xl font-light leading-tight">Join the world's premier destination for high-end commerce.</h3>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-center px-8 lg:px-24 py-16 bg-accent-cream">
                <div class="max-w-md w-full mx-auto">
                    <h1 class="font-display text-4xl font-bold mb-4">Partner with BUYME</h1>
                    <p class="text-sm text-primary/60 mb-8 leading-relaxed uppercase tracking-widest">Create your professional seller identity.</p>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <a href="#" class="flex items-center justify-center gap-2 border border-primary/20 py-3 hover:bg-white transition-all text-[10px] font-bold uppercase tracking-widest">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" class="size-3" alt="Google"> Google
                        </a>
                        <a href="#" class="flex items-center justify-center gap-2 border border-primary/20 py-3 hover:bg-white transition-all text-[10px] font-bold uppercase tracking-widest">
                            <img src="https://www.svgrepo.com/show/512120/facebook-176.svg" class="size-3" alt="Facebook"> Facebook
                        </a>
                    </div>

                    <div class="relative flex items-center mb-8">
                        <div class="flex-grow border-t border-primary/10"></div>
                        <span class="mx-4 text-[10px] uppercase tracking-widest text-primary/40">Or register manually</span>
                        <div class="flex-grow border-t border-primary/10"></div>
                    </div>

                    {% if error %}
                    <div class="mb-6 p-4 bg-red-50 border-l-2 border-red-900 text-red-900 text-xs italic">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data" class="space-y-6">
                        {% csrf_token %}
                        
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">First Name</label>
                                <input type="text" name="first_name" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Last Name</label>
                                <input type="text" name="last_name" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Email Address</label>
                            <input type="email" name="email" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm">
                        </div>

                        <div>
                            <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Phone Number</label>
                            <input type="tel" name="phone" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm" placeholder="+1 (000) 000-0000">
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Password</label>
                                <input type="password" name="password" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Confirm</label>
                                <input type="password" name="confirm_password" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm">
                            </div>
                        </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Profile_pic</label>
                                <input type="file" name="profile_image" required class="w-full bg-transparent border-b border-primary/20 py-3 focus:border-primary transition-colors outline-none text-sm">
                            </div>
                        </div>
                        <div class="pt-6">
                            <button type="submit" class="w-full bg-primary text-white py-4 text-xs uppercase tracking-[0.3em] font-bold hover:bg-opacity-90 transition-all">
                                Submit Account
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
