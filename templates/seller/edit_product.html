<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product | GlobalStore Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body{font-family: 'Plus Jakarta Sans', sans-serif;}
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <nav class="bg-white border-b border-gray-100 px-8 py-5 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-5">
            <a href="javascript:history.back()" class="h-11 w-11 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-indigo-600 transition-all shadow-sm">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <h1 class="text-2xl font-black text-gray-800 italic uppercase tracking-tighter">Edit <span class="text-indigo-600">Listing</span></h1>
        </div>
        <div class="flex gap-4">
            <a href="{% url 'inventory_page' %}" class="px-6 py-3 rounded-xl text-gray-400 text-sm font-black uppercase tracking-widest hover:text-gray-600 transition-all flex items-center">Discard</a>
            <button type="submit" form="editProductForm" class="px-10 py-3 rounded-xl bg-indigo-600 text-white text-sm font-black uppercase tracking-widest shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                Save Changes
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-6">
        <form id="editProductForm" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            {% csrf_token %}

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm space-y-8">
                    <h3 class="text-sm font-black text-indigo-600 uppercase tracking-[0.25em]">01. Product Identity</h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Title*</label>
                            <input type="text" name="name" value="{{ product.name }}" required
                                   class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none focus:ring-2 focus:ring-indigo-500/10 transition-all">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-purple-600 uppercase tracking-widest ml-1">Current SKU (Fixed)</label>
                            <input type="text" name="sku" value="{{ product.sku_code }}" required readonly
                                   class="w-full px-6 py-5 rounded-2xl bg-purple-50 text-purple-700 border-none text-base font-black outline-none uppercase tracking-tighter cursor-not-allowed">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Subcategory*</label>
                            <select name="subcategory" required class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none appearance-none cursor-pointer">
                                {% for sub in subcategories %}
                                    <option value="{{ sub.id }}" {% if sub.id == product.subcategory.id %}selected{% endif %}>{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="space-y-3">
                            <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Brand Name</label>
                            <input type="text" name="brand" value="{{ product.brand }}" placeholder="Brand Name" class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-bold outline-none">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[13px] font-black text-gray-400 uppercase tracking-widest ml-1">Description*</label>
                        <textarea name="description" rows="5" class="w-full px-6 py-5 rounded-2xl bg-gray-50 border-none text-base font-medium leading-relaxed outline-none">{{ product.description }}</textarea>
                    </div>
                </div>

                <div class="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm space-y-8">
                    <h3 class="text-sm font-black text-blue-600 uppercase tracking-[0.25em]">02. Financial & Tax</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">MRP*</label>
                            <input type="number" step="0.01" name="price" value="{{ product.price }}" required class="w-full px-5 py-5 rounded-xl bg-gray-50 border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">Sale Price*</label>
                            <input type="number" step="0.01" name="selling_price" value="{{ product.selling_price }}" required class="w-full px-5 py-5 rounded-xl bg-green-50 text-green-700 border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">Cost Price*</label>
                            <input type="number" step="0.01" name="cost_price" value="{{ product.cost_price }}" required class="w-full px-5 py-5 rounded-xl bg-gray-50 border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[12px] font-black text-gray-400 uppercase tracking-widest">Tax (%)*</label>
                            <input type="number" step="0.1" name="tax_percentage" value="{{ product.tax_percentage }}" class="w-full px-5 py-5 rounded-xl bg-gray-50 border-none text-base font-black outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-5">
                    <h3 class="text-xs font-black text-orange-600 uppercase tracking-[0.2em]">03. Media</h3>
                    <div class="aspect-square w-full bg-gray-50 rounded-2xl overflow-hidden border-2 border-dashed border-gray-100 relative group">
                        {% if product.image %}
                            <img src="{{ product.image.url }}" class="w-full h-full object-cover transition-all group-hover:scale-110">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                                <p class="text-[11px] font-black text-white uppercase tracking-widest">Replace Photo</p>
                            </div>
                        {% else %}
                            <div class="w-full h-full flex flex-col items-center justify-center">
                                <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-3"></i>
                                <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Upload Photo</p>
                            </div>
                        {% endif %}
                        <input type="file" name="image" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-8">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">04. Stock Control</h3>
                    <div class="flex justify-between items-center border-b border-gray-50 pb-6">
                        <label class="text-sm font-black text-gray-400 uppercase italic">Stock Qty*</label>
                        <input type="number" name="stock" value="{{ product.stock_quantity }}" required min="0"
                               class="bg-gray-50 rounded-xl px-5 py-3 text-right font-black text-2xl outline-none w-28 text-green-600">
                    </div>
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Returnable</span>
                            <input type="checkbox" name="is_returnable" {% if product.is_returnable %}checked{% endif %} class="w-6 h-6 accent-indigo-600 rounded">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Cancellable</span>
                            <input type="checkbox" name="is_cancellable" {% if product.is_cancellable %}checked{% endif %} class="w-6 h-6 accent-indigo-600 rounded">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Return Days</span>
                            <input type="number" name="return_days" value="{{ product.return_days }}" required min="0" class="bg-gray-50 rounded-lg px-4 py-2 text-sm font-black w-16 text-center">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm space-y-6">
                    <h3 class="text-xs font-black text-purple-600 uppercase tracking-[0.2em]">05. Shipping Details</h3>
                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Weight (kg)</p>
                            <input type="number" step="0.01" name="weight" value="{{ product.weight }}" placeholder="0.00" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Length (cm)</p>
                            <input type="number" name="length" value="{{ product.length }}" placeholder="0" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Width (cm)</p>
                            <input type="number" name="width" value="{{ product.width }}" placeholder="0" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                        <div class="space-y-2">
                            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Height (cm)</p>
                            <input type="number" name="height" value="{{ product.height }}" placeholder="0" class="w-full bg-gray-50 px-5 py-4 rounded-xl border-none text-base font-black outline-none">
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </main>

</body>
</html>
