<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Profile | BuyMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:block">
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-2xl font-bold text-green-600">BuyMe</h1>
            </div>
            <nav class="mt-6 px-4 space-y-2">
                <a href="{% url 'seller_dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-xl transition-all">
                    <i class="fas fa-chart-pie mr-3"></i> Dashboard
                </a>
                <a href="{% url 'inventory_page' %}" class="flex items-center px-4 py-3 text-sm font-medium text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-xl transition-all">
                    <i class="fas fa-boxes mr-3"></i> My Inventory
                </a>
                <a href="{% url 'seller_profile' %}" class="flex items-center px-4 py-3 text-sm font-bold text-green-700 bg-green-50 rounded-xl">
                    <i class="fas fa-id-card mr-3"></i> Profile Settings
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white border-b border-gray-200 px-8 py-5 flex justify-between items-center sticky top-0 z-10">
                <h2 class="text-2xl font-bold text-gray-800">Business Profile</h2>
                <span class="text-xs font-bold text-gray-400 uppercase">ID: #{{ profile.id }}</span>
            </header>

            <div class="p-8 max-w-4xl mx-auto">
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-6 p-4 rounded-xl {% if message.tags == 'error' %}bg-red-50 text-red-700{% else %}bg-green-50 text-green-700{% endif %} text-xs font-bold border border-current">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" enctype="multipart/form-data" class="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm space-y-8">
                    {% csrf_token %}

                    <div>
                        <h3 class="text-sm font-bold text-green-600 mb-4 flex items-center">
                            <i class="fas fa-store mr-2"></i> Store Identity
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Shop Name</label>
                                <input type="text" name="shopname" value="{{ profile.shopname|default:'' }}" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Category</label>
                                <select name="category" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                                    <option value="Electronics" {% if profile.category == 'Electronics' %}selected{% endif %}>Electronics</option>
                                    <option value="Fashion" {% if profile.category == 'Fashion' %}selected{% endif %}>Fashion</option>
                                    <option value="Home" {% if profile.category == 'Home' %}selected{% endif %}>Home & Kitchen</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Website (Optional)</label>
                                <input type="url" name="website" value="{{ profile.website|default:'' }}" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Profile Image</label>
                                <input type="file" name="profile_image" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-50 file:text-green-700">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-100">
                        <h3 class="text-sm font-bold text-green-600 mb-4 flex items-center">
                            <i class="fas fa-file-invoice mr-2"></i> Legal & Tax Details
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">GST Number</label>
                                <input type="text" name="gst_number" value="{{ profile.gst_number|default:'' }}" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">PAN Number</label>
                                <input type="text" name="pan_number" value="{{ profile.pan_number|default:'' }}" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-100">
                        <h3 class="text-sm font-bold text-green-600 mb-4 flex items-center">
                            <i class="fas fa-university mr-2"></i> Banking Details
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Bank Account Number</label>
                                <input type="text" name="bank_account_number" value="{{ profile.bank_account_number|default:'' }}" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase">IFSC Code</label>
                                <input type="text" name="ifsc_code" value="{{ profile.ifsc_code|default:'' }}" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1 pt-6 border-t border-gray-100">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Business Address</label>
                        <textarea name="business_address" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 outline-none">{{ profile.business_address|default:'' }}</textarea>
                    </div>

                    <div class="pt-8 flex justify-end">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-12 py-3 rounded-xl font-bold shadow-lg transition-all transform active:scale-95">
                            Update Business Profile
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
