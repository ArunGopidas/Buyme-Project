<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Settings | LUXE ATELIER</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#dda71d",
                        "background-dark": "#1A1A1A",
                        "cream": "#F5F5DC",
                        "matte-black": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .sidebar-link.active { color: #dda71d; border-right: 2px solid #dda71d; }
    </style>
</head>
<body class="bg-background-dark font-display text-cream overflow-x-hidden">

<main class="max-w-[1440px] mx-auto px-6 lg:px-20 py-12 lg:py-20">
    <div class="flex flex-col lg:flex-row gap-16">
        
{% include 'customer/sidebar.html' %}

        <section class="flex-1">
            <header class="mb-12">
                <span class="text-primary font-semibold tracking-[0.4em] uppercase text-[10px] mb-2 block">Account Settings</span>
                <h1 class="font-serif text-4xl md:text-5xl">Security & <i class="font-normal">Privacy</i></h1>
            </header>

            <div class="max-w-2xl space-y-16">
                <div class="space-y-8">
                    <h3 class="text-xs font-bold uppercase tracking-widest border-b border-cream/10 pb-4">Credentials</h3>
                    <div class="space-y-6">
                        <input type="password" placeholder="NEW PASSWORD" class="w-full bg-transparent border-b border-cream/20 border-t-0 border-x-0 py-4 text-[10px] uppercase tracking-widest focus:ring-0 focus:border-primary outline-none">
                        <button class="bg-primary text-matte-black px-10 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-all">Update Security</button>
                    </div>
                </div>

                <div class="space-y-8">
                    <h3 class="text-xs font-bold uppercase tracking-widest border-b border-cream/10 pb-4">Email Preferences</h3>
                    <div class="space-y-4">
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm font-light uppercase tracking-widest text-cream/60 group-hover:text-cream transition-colors">Exclusive Editorial Access</span>
                            <input type="checkbox" checked class="rounded-none bg-transparent border-cream/30 text-primary focus:ring-0">
                        </label>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
