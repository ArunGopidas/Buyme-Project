<header class="sticky top-0 z-50 w-full border-b border-cream/10 bg-background-dark/95 backdrop-blur-md px-6 lg:px-20 py-4">
    <div class="max-w-[1440px] mx-auto flex items-center justify-between">
        <div class="flex items-center gap-12">
            <a class="flex items-center gap-2" href="/">
                <span class="text-primary material-symbols-outlined text-3xl">storm</span>
                <h1 class="font-serif text-2xl font-bold tracking-widest text-cream ">BuyME</h1>
            </a>
            <nav class="hidden lg:flex items-center gap-8 text-[11px] font-semibold uppercase tracking-[0.2em]">
                <a class="hover:text-primary transition-colors" href="{%  url 'productlist' %}">products</a>
                <a class="hover:text-primary transition-colors" href="#">collection</a>
                <a class="hover:text-primary transition-colors" href="#">category</a>
            </nav>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center bg-cream/5 border border-cream/10 rounded-full px-4 py-1.5">
                <span class="material-symbols-outlined text-lg text-cream/60">search</span>
                <input class="bg-transparent border-none focus:ring-0 text-[10px] tracking-widest w-32 placeholder:text-cream/40 uppercase" placeholder="SEARCH" type="text"/>
            </div>

            {% if user.is_authenticated %}
                <div class="relative group">
                    <button class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-[0.2em] text-cream hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">person</span>
                        <span class="hidden sm:inline">{{ user.first_name}}</span>
                    </button>
                    
                    <div class="absolute right-0 hidden group-hover:block pt-4 w-40">
                        <div class="bg-background-dark border border-cream/10 rounded-sm shadow-xl overflow-hidden">
                            <a href="{% url 'customer_profile' %}" class="block px-4 py-3 text-[9px] font-bold uppercase tracking-widest text-cream hover:bg-primary hover:text-matte-black transition-colors border-b border-cream/5">
                                My Profile
                            </a>
                            <a href="{% url 'logout' %}" class="block px-4 py-3 text-[9px] font-bold uppercase tracking-widest text-cream hover:bg-primary hover:text-matte-black transition-colors">
                                Logout
                            </a>
                        </div>
                    </div>
                </div>

                <button class="relative hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">shopping_bag</span>
                    <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-matte-black">0</span>
                </button>
            {% else %}
                <a href="{% url 'login' %}" class="text-[10px] font-bold uppercase tracking-[0.2em] text-cream hover:text-primary transition-colors">Login</a>
                <div class="relative group">
                    <a href="#" class="flex items-center gap-1 text-[10px] font-bold uppercase tracking-[0.2em] text-cream hover:text-primary transition-colors">
                        Register <span class="material-symbols-outlined text-sm">expand_more</span>
                    </a>
                    
                    <div class="absolute right-0 hidden group-hover:block pt-4 w-48">
                        <div class="bg-background-dark border border-cream/10 rounded-sm shadow-xl overflow-hidden">
                            <a href="{% url 'customer_register' %}" class="block px-4 py-3 text-[9px] font-bold uppercase tracking-widest text-cream hover:bg-primary hover:text-matte-black transition-colors border-b border-cream/5">
                                Customer Register
                            </a>
                            <a href="{% url 'register' %}?role=seller" class="block px-4 py-3 text-[9px] font-bold uppercase tracking-widest text-cream hover:bg-primary hover:text-matte-black transition-colors">
                                Seller Register
                            </a>
                        </div>
                    </div>
                </div>
            {% endif %}

            <button class="lg:hidden">
                <span class="material-symbols-outlined text-cream">menu</span>
            </button>
        </div>
    </div>
</header>
