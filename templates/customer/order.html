<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Orders | LUXE ATELIER</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#dda71d",
                        "background-dark": "#1A1A1A",
                        "cream": "#F5F5DC",
                        "matte-black": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .sidebar-link.active { color: #dda71d; border-right: 2px solid #dda71d; }
    </style>
</head>
<body class="bg-background-dark font-display text-cream overflow-x-hidden">

<main class="max-w-[1440px] mx-auto px-6 lg:px-20 py-12 lg:py-20">
    <div class="flex flex-col lg:flex-row gap-16">
        
{% include 'customer/sidebar.html' %}

        <section class="flex-1">
            <header class="mb-12">
                <span class="text-primary font-semibold tracking-[0.4em] uppercase text-[10px] mb-2 block">History</span>
                <h1 class="font-serif text-4xl md:text-5xl">Your <i class="font-normal">Orders</i></h1>
            </header>

            <div class="space-y-6">
                <div class="border border-cream/10 bg-cream/[0.02] p-8">
                    <div class="flex flex-col md:flex-row justify-between gap-6 mb-8 border-b border-cream/5 pb-6">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 flex-1">
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-cream/30 mb-1">Order ID</p>
                                <p class="text-xs font-bold">#LX-88291</p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-cream/30 mb-1">Date</p>
                                <p class="text-xs font-bold uppercase">12 Mar 2026</p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-cream/30 mb-1">Status</p>
                                <span class="text-[9px] px-2 py-0.5 border border-primary text-primary uppercase font-bold">Shipped</span>
                            </div>
                        </div>
                        <button class="text-[10px] border border-cream/20 px-6 py-2 uppercase tracking-widest hover:bg-cream hover:text-matte-black transition-all">Details</button>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="size-20 bg-cream/5">
                            <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80" class="w-full h-full object-cover opacity-60">
                        </div>
                        <div>
                            <h4 class="text-sm font-semibold tracking-wide uppercase">Structured Wool Blazer</h4>
                            <p class="text-[10px] text-cream/40 mt-1 uppercase tracking-widest">$1,250.00 | Midnight Black</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
