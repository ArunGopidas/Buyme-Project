<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Account | LUXE ATELIER</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#dda71d",
                        "background-dark": "#1A1A1A",
                        "cream": "#F5F5DC",
                        "matte-black": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .sidebar-link.active { color: #dda71d; border-right: 2px solid #dda71d; }

        /* LUXURY FORM STYLING */
        .luxe-input-group {
            position: relative;
            padding-top: 1.5rem;
        }

        .luxe-input {
            width: 100%;
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid rgba(245, 245, 220, 0.1) !important;
            padding: 0.75rem 0 !important;
            color: #F5F5DC !important;
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .luxe-input:focus {
            outline: none !important;
            border-bottom: 1px solid #dda71d !important;
            box-shadow: none !important;
        }

        .luxe-label {
            position: absolute;
            top: 2rem;
            left: 0;
            color: rgba(245, 245, 220, 0.3);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            font-weight: 700;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Float the label up when focused or input has text */
        .luxe-input:focus ~ .luxe-label,
        .luxe-input:not(:placeholder-shown) ~ .luxe-label {
            top: 0.5rem;
            font-size: 0.55rem;
            color: #dda71d;
        }

        /* Subtle glow on focus */
        .luxe-input-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: #dda71d;
            transition: width 0.6s ease;
        }
        .luxe-input-group:focus-within::after {
            width: 100%;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-cream overflow-x-hidden">

<main class="max-w-[1440px] mx-auto px-6 lg:px-20 py-12 lg:py-20">
    <div class="flex flex-col lg:flex-row gap-16 lg:gap-32">
   {% include 'customer/sidebar.html' %}     

        <section class="flex-1 max-w-2xl">
            <form method="POST" action="/update-profile">
                <header class="mb-16">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-primary font-bold tracking-[0.5em] uppercase text-[9px]">Identity & Preferences</span>
                        <div class="h-[1px] w-12 bg-primary/30 mt-2"></div>
                    </div>
                    <h1 class="font-serif text-5xl md:text-6xl mb-4 leading-tight">
                        {{ user.first_name }} <br>
                        <i class="font-normal opacity-50">{{ user.last_name }}</i>
                    </h1>
                </header>

                <div class="space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div class="luxe-input-group">
                            <input type="text" name="first_name" id="first_name" value="{{ user.first_name }}" placeholder=" " class="luxe-input">
                            <label for="first_name" class="luxe-label">First Name</label>
                        </div>
                        <div class="luxe-input-group">
                            <input type="text" name="last_name" id="last_name" value="{{ user.last_name }}" placeholder=" " class="luxe-input">
                            <label for="last_name" class="luxe-label">Last Name</label>
                        </div>
                    </div>

                    <div class="luxe-input-group">
                        <input type="email" name="email" id="email" value="{{ user.email }}" placeholder=" " class="luxe-input">
                        <label for="email" class="luxe-label">Email Address</label>
                    </div>

                    <div class="luxe-input-group">
                        <input type="tel" name="phone" id="phone" value="{{ user.phone_number }}" placeholder=" " class="luxe-input">
                        <label for="phone" class="luxe-label">Phone Number</label>
                    </div>

                    <div class="pt-8 flex items-center justify-between border-t border-cream/5">
                        <div class="flex items-center gap-4">
                            <div class="size-10 rounded-full border border-primary/30 flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary text-base">verified</span>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest font-bold">Luxe Private Member</p>
                                <p class="text-[9px] text-cream/30 uppercase tracking-tighter">Joined Nov 2022</p>
                            </div>
                        </div>
                        
                        <button type="submit" class="group relative overflow-hidden bg-primary text-matte-black px-12 py-4 text-[10px] font-bold uppercase tracking-[0.3em] transition-all hover:pr-14">
                            <span class="relative z-10">Save Portfolio</span>
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-all duration-300">→</span>
                        </button>
                    </div>
                </div>
            </form>
        </section>
    </div>
</main>

<footer class="mt-20 py-10 border-t border-cream/5">
    <p class="text-center text-[9px] tracking-[0.4em] text-cream/20 uppercase">Luxe Atelier &copy; 2026 Crafted for the few.</p>
</footer>

</body>
</html>
