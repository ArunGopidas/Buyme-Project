<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Wishlist | LUXE ATELIER</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#dda71d",
                        "background-dark": "#1A1A1A",
                        "cream": "#F5F5DC",
                        "matte-black": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .sidebar-link.active { color: #dda71d; border-right: 2px solid #dda71d; }
    </style>
</head>
<body class="bg-background-dark font-display text-cream overflow-x-hidden">

<main class="max-w-[1440px] mx-auto px-6 lg:px-20 py-12 lg:py-20">
    <div class="flex flex-col lg:flex-row gap-16">
        
{% include 'customer/sidebar.html' %}

        <section class="flex-1">
            <header class="mb-12">
                <span class="text-primary font-semibold tracking-[0.4em] uppercase text-[10px] mb-2 block">Curated Pieces</span>
                <h1 class="font-serif text-4xl md:text-5xl">The <i class="font-normal">Wishlist</i></h1>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="group relative border border-cream/5 p-4 bg-cream/[0.01]">
                    <button class="absolute top-6 right-6 z-10 text-cream/30 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                    <div class="aspect-[3/4] overflow-hidden mb-6">
                        <img src="https://images.unsplash.com/photo-1598033129183-c4f50c7176c8?auto=format&fit=crop&q=80" class="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105">
                    </div>
                    <div class="text-center">
                        <h5 class="text-xs font-bold uppercase tracking-widest mb-1">Architectural Linen Shirt</h5>
                        <p class="text-primary text-xs font-bold mb-6">$420.00</p>
                        <button class="w-full bg-primary text-matte-black py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-colors">Add to Bag</button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
